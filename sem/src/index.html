<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Online</title>
    <link rel="stylesheet" href="css/default.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/codex_card.css">
</head>

<body>
    <header>
        <h1>Codex Online</h1>
        <flexbox>
            <button id="menu-button">Menu</button>
            <button id="setup-button">Setup</button>
            <button id="rules-button">Show Rules</button>
            <button id="game-button">Game</button>
            <button id="results-button">Results</button>
        </flexbox>
    </header>

    <main>
        <section id="view-menu" hidden>TODO</section>
        <section id="view-setup" hidden>TODO</section>
        <section id="view-rules" hidden>TODO</section>
        <section id="view-game">

            <!-- Header -->
            <header class="game-header">
                <div id="players-bar">
                    <div class="player active">
                        Koláč - 12 Points
                    </div>
                    <div class="player">
                        Pinki - 9 Points
                    </div>
                </div>

                <div id="turn-info">
                    Turn: 3 | Koláč
                </div>
                <div class="game-settings">
                    <input type="checkbox" name="show-log">
                    <label for="show-log">Show Log</label>
                </div>
            </header>


            <!-- Main -->
            <div class="game-main">

                <!-- Board -->
                <div class="board-wrapper">
                    <div id="board-container">
                        <svg id="board-svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid meet">
                            <rect x="0" y="0" width="1600" height="1000" fill="#f3efe6"></rect>

                            <g id="board-grid"></g>
                        </svg>

                        <div id="board-cards-layer"></div>
                    </div>
                    <div id="board-draw-layer">

                    </div>
                    <!-- Hand -->
                    <div id="player-hand-layer">
                        <codex-card></codex-card>
                        <codex-card></codex-card>
                        <codex-card></codex-card>
                    </div>
                </div>



                <!-- Side -->
                <aside class="side-panel" hidden>
                    <h3>Log</h3>
                    <div class="log">
                        <div>Patrik placed a card</div>
                        <div>Pinki draw a card</div>
                    </div>
                </aside>

            </div>




        </section>
        <section id="view-results" hidden>TODO</section>
    </main>
</body>

<script type="module" src="js/components/codex_card.js"></script>
<script type="module" src="js/app.js"></script>


</html>
