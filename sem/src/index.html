<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Online</title>
    <link rel="stylesheet" href="css/default.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/codex_card.css">
</head>

<body>
    <div class="app">
        <header class="app-header">
            <h1>Codex Online</h1>
            <flexbox>
                <button id="menu-button">Menu</button>
                <button id="setup-button">Setup</button>
                <button id="rules-button">Show Rules</button>
                <button id="game-button">Game</button>
                <button id="results-button">Results</button>
            </flexbox>
        </header>

        <main class="app-main">
            <section id="view-menu" hidden>TODO</section>
            <section id="view-setup" hidden>TODO</section>
            <section id="view-rules" hidden>TODO</section>
            <section id="view-game">

                <!-- Header -->
                <header class="game-header">
                    <div id="players-bar">
                        <div class="player active-player">
                            Koláč - 12 Points
                        </div>
                        <div class="player">
                            Pinki - 9 Points
                        </div>
                    </div>

                    <div id="turn-info">
                        Turn: 3 | Koláč
                    </div>
                    <div class="game-settings">
                        <input type="checkbox" name="show-log">
                        <label for="show-log">Show Log</label>
                    </div>
                </header>


                <!-- Main -->
                <div class="game-main">

                    <!-- Board -->
                    <div class="board-wrapper">
                        <div id="board-viewport">
                            <div id="board-container">
                                <svg id="board-svg" viewBox="0 0 6000 3600" preserveAspectRatio="xMidYMid meet">
                                    <rect x="0" y="0" width="6000" height="3600" fill="#f3efe6"></rect>

                                    <g id="board-grid"></g>
                                </svg>

                                <div id="board-cards-layer"></div>
                            </div>
                        </div>
                        <div id="draw-overlay">
                            <div class="draw-modal">
                                <div id="board-draw-layer"></div>
                            </div>
                        </div>
                        <!-- Hand -->
                        <div id="player-hand-layer"></div>
                        <div id="board-drag-layer"></div>
                    </div>



                    <!-- Side -->
                    <aside class="side-panel">
                        OBJECTIVES
                    </aside>

                </div>




            </section>
            <section id="view-results" hidden>TODO</section>
        </main>
    </div>
    <div id="turn-wait"></div>
</body>

<script type="module" src="js/components/codex_card.js"></script>
<script type="module" src="js/app.js"></script>


</html>
