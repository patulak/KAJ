<head>

    <title>Codex Online</title>
    <link rel="stylesheet" href="css/default.css">

<body>
    <header>
        <h1>Codex Online</h1>
        <flexbox>
            <button>Show Rules</button>
            <button>Settings</button>
            <button>X</button>

        <section id="view-game">

            <!-- Header -->
            <header class="game-header">
                <div id="players-bar">
                    <div class="player active">
                        Koláč - 12 Points
                    </div>
                    <div class="player">
                        Pinki - 9 Points
                    </div>
                </div>

                <div id="turn-info">
                    Turn: 3 | Koláč
                </div>
                <div class="game-settings">
                    <input type="checkbox" name="show-log">
                    <label for="show-log">Show Log</label>
                </div>
            </header>


            <!-- Main -->
            <div class="game-main">

                <!-- Board -->

                    <div id="board-container">

                            <g id="board-grid" opacity="0.2" stroke="#8a7f6b" stroke-width="1">

                                <line x1="0" y1="720" x2="1600" y2="720" />
                                <line x1="0" y1="800" x2="1600" y2="800" />
                                <line x1="0" y1="880" x2="1600" y2="880" />

                                <line x1="80" y1="0" x2="80" y2="1000" />

                                <line x1="800" y1="0" x2="800" y2="1000" />
                                <line x1="880" y1="0" x2="880" y2="1000" />
                                <line x1="960" y1="0" x2="960" y2="1000" />-->
                            </g>
                        </svg>

                        <div id="board-cards-layer"></div>
                    </div>
                    <!-- Hand -->
                    <div id="player-hand-layer">
                        <codex-card></codex-card>
                        <codex-card></codex-card>
                        <codex-card></codex-card>
                    </div>
                </div>



                <!-- Side -->
                <aside class="side-panel" hidden>
                    <h3>Log</h3>
                    <div class="log">
                        <div>Patrik placed a card</div>
                        <div>Pinki draw a card</div>
                    </div>
                </aside>

            </div>




        </section>
        <section id="view-results" hidden>TODO</section>
    </main>
</body>
